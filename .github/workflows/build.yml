name: build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - run: go mod download
      - run: go mod tidy
      - run: git diff --exit-code -- go.mod go.sum
      - run: go test -mod=vendor ./...
      - run: go vet -mod=vendor ./...
      - run: go test -race -mod=vendor ./auth ./firewall ./gate ./knock ./netx ./policy ./protocol ./relay
      - run: go test -mod=vendor ./...
        working-directory: test/integration/grpc
      - run: go mod edit -replace github.com/libknock/libknock=../.. && go test -mod=vendor ./...
        working-directory: observability/prometheus
      - run: go build -mod=vendor ./examples/custom-binary-protocol/server ./examples/custom-binary-protocol/client ./examples/http-client/server ./examples/http-client/client ./examples/tls-server ./examples/tls-client
      - run: go build -mod=vendor ./examples/grpc-server ./examples/grpc-client
        working-directory: test/integration/grpc
      - run: GOOS=darwin GOARCH=amd64 go build -mod=vendor ./...
      - run: GOOS=darwin GOARCH=arm64 go build -mod=vendor ./...
      - run: GOOS=linux GOARCH=arm64 go build -mod=vendor ./...
      - run: GOOS=windows GOARCH=amd64 go build -mod=vendor ./...
      - run: GOOS=windows GOARCH=arm64 go build -mod=vendor ./...
